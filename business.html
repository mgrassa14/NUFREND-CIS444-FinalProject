<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shelter Profile</title>
  <link rel="stylesheet" href="business.css">
</head>
<body>
<button id="logoutBtn">Logout</button>
<div class="card">
  <img src="https://placedog.net/500?id=2" alt="Dog">
  
  <div class="content">
    <h2>Puppygram Shelter</h2>
    <p>📍 San Diego, CA</p>
    <p>📞 (619) 000-0000</p>

    <div class="section">
      <strong>Pet Available:</strong>
      <p>Buddy 🐶 - Friendly golden retriever who loves people!</p>
    </div>

    <div class="section">
      <strong>Good With:</strong>
      <div class="icons">
        <div class="icon" id="pets">🐾 Good with Pets</div>
        <div class="icon" id="kids">👶 Good with Kids</div>
      </div>
    </div>

    <div class="section">
      <strong>Dog Size:</strong>
      <select>
        <option>Small</option>
        <option selected>Medium</option>
        <option>Large</option>
      </select>
    </div>

    <div class="section">
      <strong>Age:</strong>
      <select>
        <option>Puppy</option>
        <option selected>Young</option>
        <option>Adult</option>
        <option>Senior</option>
      </select>
    </div>
  </div>

  <div class="buttons">
    <button class="btn no">Skip</button>
    <button class="btn yes">Interested</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
