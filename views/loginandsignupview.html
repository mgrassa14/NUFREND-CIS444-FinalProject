<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PuppyGram – Login/Sign Up</title>
  <!-- <link rel="stylesheet" href=".../frontend/css/main.css" /> -->
   <link rel="stylesheet" href="/frontend/css/output-main.css" />
</head>
<body class="min-h-screen bg-gray-200 font-sans">

  <!-- Background placeholder -->
  <div class="min-h-screen bg-gradient-to-br from-green-100 via-gray-100 to-amber-50 flex items-center justify-center text-gray-400 text-sm">
    Content behind the modal
  </div>

  <!-- Modal Backdrop -->
  <div id="modalBackdrop" class="fixed inset-0 bg-black/45 backdrop-blur-sm flex items-center justify-center z-50">

    <!-- Modal Card -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-8 relative">

      <!-- Close Button -->
      <button onclick="closeModal()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 transition-colors">
        <img src="/frontend/media/img/close.svg" alt="Close" class="w-[22px] h-[22px]" />
      </button>

      <!-- Heading -->
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Welcome to PuppyGram</h1>
      <p class="text-gray-500 text-sm mb-6">Login to save your favorite dogs and connect with shelters</p>

      <!-- Tab Toggle -->
      <div class="relative flex bg-gray-100 rounded-full p-1 mb-6">
        <div id="tabSlider" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-full shadow-sm transition-transform duration-200 ease-out"></div>
        <button id="tabLogin" onclick="switchTab('login')" class="flex-1 relative z-10 py-2.5 text-[15px] font-semibold text-gray-900 bg-transparent border-none cursor-pointer transition-colors duration-200">Login</button>
        <button id="tabSignUp" onclick="switchTab('signup')" class="flex-1 relative z-10 py-2.5 text-[15px] font-semibold text-gray-500 bg-transparent border-none cursor-pointer transition-colors duration-200">Sign Up</button>
      </div>

      <!-- Form -->
      <form onsubmit="handleSubmit(event)" class="flex flex-col gap-4">

        <!-- Name (signup only) -->
        <div id="nameField" class="max-h-0 overflow-hidden transition-all duration-300">
          <label id="nameLabel" class="block text-sm font-semibold text-gray-800 mb-1.5">Full Name</label>
          <div class="relative">
            <img src="/frontend/media/img/user.svg" alt="" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[18px] h-[18px] opacity-40" />
            <input type="text" placeholder="Your full name" class="w-full py-3 pl-11 pr-3.5 border-[1.5px] border-gray-200 rounded-[10px] text-[15px] text-gray-900 bg-gray-50 placeholder-gray-400 outline-none focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/10 focus:bg-white transition-all" />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-1.5">Email</label>
          <div class="relative">
            <img src="/frontend/media/img/mail.svg" alt="" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[18px] h-[18px] opacity-40" />
            <input type="email" placeholder="your@email.com" required class="w-full py-3 pl-11 pr-3.5 border-[1.5px] border-gray-200 rounded-[10px] text-[15px] text-gray-900 bg-gray-50 placeholder-gray-400 outline-none focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/10 focus:bg-white transition-all" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-1.5">Password</label>
          <div class="relative">
            <img src="/frontend/media/img/lock.svg" alt="" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[18px] h-[18px] opacity-40" />
            <input type="password" placeholder="••••••••" required class="w-full py-3 pl-11 pr-3.5 border-[1.5px] border-gray-200 rounded-[10px] text-[15px] text-gray-900 bg-gray-50 placeholder-gray-400 outline-none focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/10 focus:bg-white transition-all" />
          </div>
        </div>

        <!-- Account Type -->
        <div>
          <label class="block text-sm font-semibold text-gray-800 mb-2">Account Type</label>
          <div class="flex gap-3">
            <div id="cardAdopter" onclick="selectType('adopter')" class="flex-1 flex flex-col items-center justify-center gap-2 py-5 px-3 border-2 border-indigo-500 bg-indigo-50 rounded-xl cursor-pointer transition-all duration-200 hover:border-indigo-300">
              <img src="/frontend/media/img/user.svg" alt="Adopter" class="w-9 h-9" />
              <span class="text-sm font-semibold text-gray-700">Adopter</span>
            </div>
            <div id="cardShelter" onclick="selectType('shelter')" class="flex-1 flex flex-col items-center justify-center gap-2 py-5 px-3 border-2 border-gray-200 bg-white rounded-xl cursor-pointer transition-all duration-200 hover:border-indigo-300">
              <img src="/frontend/media/img/shelter.svg" alt="Shelter" class="w-9 h-9" />
              <span class="text-sm font-semibold text-gray-700">Shelter</span>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="w-full py-3 bg-gray-900 hover:bg-gray-800 active:scale-[0.98] text-white font-semibold rounded-xl transition-all text-[15px] mt-1">
          Sign In
        </button>
      </form>

    </div>
  </div>

  <script src="/frontend/js/script.js"></script>
</body>
</html>
