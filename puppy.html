<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adoption Profile</title>
  <link rel="stylesheet" href="puppy.css">
</head>
<body>

<div class="card">
  <img src="https://placedog.net/500" alt="Dog">
  <div class="content">
    <h2>Alex, 24</h2>
    <p>Dog lover looking to adopt a furry best friend 🐶</p>

    <div class="section">
      <strong>Household:</strong>
      <div class="icons">
        <div class="icon" id="pets">🐾 Has Pets</div>
        <div class="icon" id="kids">👶 No Kids</div>
      </div>
    </div>

    <div class="section">
      <strong>Looking For Dog Size:</strong>
      <select id="size">
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
      </select>
    </div>

    <div class="section">
      <strong>Preferred Age Range:</strong>
      <select id="age">
        <option>Puppy (0-1 yr)</option>
        <option>Young (1-3 yrs)</option>
        <option>Adult (3-7 yrs)</option>
        <option>Senior (7+ yrs)</option>
      </select>
    </div>
  </div>

  <div class="buttons">
    <button class="btn no">No</button>
    <button class="btn yes">Yes</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
