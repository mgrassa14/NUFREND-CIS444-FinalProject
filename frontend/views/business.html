<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../css/output-main.css" rel="stylesheet">
  <link href="../css/business.css" rel="stylesheet">
  <!-- <script src="../js/feed-page.js" defer></script> -->
</head>
<body>
  <div class="h-screen flex flex-col">

    <div class="flex-1 overflow-y-auto snap-y snap-mandatory scroll-pt-18">

      <header class="sticky flex justify-center top-0 z-10 bg-white p-4">
        <h1 class="text-3xl font-bold text-blue-600">NUFREND</h1>
      </header>
      <!-- middle of page -->
      
        <button id="logoutBtn">Logout</button>
        <div class="card">
        <img src="https://placedog.net/500?id=2" alt="Dog">
        
        <div class="content">
            <h2>Puppygram Shelter</h2>
            <p>📍 San Diego, CA</p>
            <p>📞 (619) 000-0000</p>

            <div class="section">
            <strong>Pet Available:</strong>
            <p>Buddy 🐶 - Friendly golden retriever who loves people!</p>
            </div>

            <div class="section">
            <strong>Good With:</strong>
            <div class="icons">
                <div class="icon" id="pets">🐾 Good with Pets</div>
                <div class="icon" id="kids">👶 Good with Kids</div>
            </div>
            </div>

            <div class="section">
            <strong>Dog Size:</strong>
            <select>
                <option>Small</option>
                <option selected>Medium</option>
                <option>Large</option>
            </select>
            </div>

            <div class="section">
            <strong>Age:</strong>
            <select>
                <option>Puppy</option>
                <option selected>Young</option>
                <option>Adult</option>
                <option>Senior</option>
            </select>
            </div>
        </div>

        <div class="buttons">
            <button class="btn no">Skip</button>
            <button class="btn yes">Interested</button>
        </div>
        </div>

    </div>

    <footer class="sticky bottom-0 bg-white border-t border-gray-300 z-10">
      <div class="mx-auto max-w-[1400px] flex justify-around items-center h-15">
        <!-- profile button -->
        <a href="#"><img src="../media/img/user.png" class="w-8 h-8"></a>
        <!-- feed page button -->
        <a href="./feed-page.html"><img src="../media/img/magnifying-glass.png" class="w-8 h-8"></a>
        <!-- favorites page -->
        <a href="./favorites-page.html"><img src="../media/img/heart.png" class="w-8 h-8"></a>
        <!-- chats page -->
        <a href="#"><img src="../media/img/chat.png" class="w-8 h-8"></a>
      </div>
    </footer>
  </div>
</body>
</html>
