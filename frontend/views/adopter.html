<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../css/output-main.css" rel="stylesheet">
  <link href="../css/adopter.css" rel="stylesheet">
  <script src="../js/adopter.js" defer></script>
</head>
<body>
  <div class="h-screen flex flex-col">

    <div class="flex-1 overflow-y-auto snap-y snap-mandatory scroll-pt-18">

      <header class="sticky flex justify-center top-0 z-10 bg-white p-4">
        <h1 class="text-3xl font-bold text-blue-600">NUFREND</h1>
      </header>
      <!-- middle of page -->
      
        <div class="card">
            <img src="https://placedog.net/500" alt="Dog">
            <div class="content">
                <h2>Alex, 24</h2>
                <p>Dog lover looking to adopt a furry best friend 🐶</p>

                <div class="section">
                <strong>Household:</strong>
                <div class="icons">
                    <div class="icon" id="pets">🐾 Has Pets</div>
                    <div class="icon" id="kids">👶 No Kids</div>
                </div>
                </div>

                <div class="section">
                <strong>Looking For Dog Size:</strong>
                <select id="size">
                    <option>Small</option>
                    <option>Medium</option>
                    <option>Large</option>
                </select>
                </div>

                <div class="section">
                <strong>Preferred Age Range:</strong>
                <select id="age">
                    <option>Puppy (0-1 yr)</option>
                    <option>Young (1-3 yrs)</option>
                    <option>Adult (3-7 yrs)</option>
                    <option>Senior (7+ yrs)</option>
                </select>
                </div>
            </div>

            <div class="buttons">
                <button class="btn no">No</button>
                <button class="btn yes">Yes</button>
            </div>
        </div>

    </div>

    <footer class="sticky bottom-0 bg-white border-t border-gray-300 z-10">
      <div class="mx-auto max-w-[1400px] flex justify-around items-center h-15">
        <!-- profile button -->
        <a href="#"><img src="../media/img/user.png" class="w-8 h-8"></a>
        <!-- feed page button -->
        <a href="./feed-page.html"><img src="../media/img/magnifying-glass.png" class="w-8 h-8"></a>
        <!-- favorites page -->
        <a href="./favorites-page.html"><img src="../media/img/heart.png" class="w-8 h-8"></a>
        <!-- chats page -->
        <a href="#"><img src="../media/img/chat.png" class="w-8 h-8"></a>
      </div>
    </footer>
  </div>
</body>
</html>
