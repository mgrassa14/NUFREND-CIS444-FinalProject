<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../css/output-main.css" rel="stylesheet">
  <script src="../js/feed-page.js" defer></script>
</head>
<body>
  <div class="h-screen flex flex-col">

    <div class="flex-1 overflow-y-auto min-h-0 snap-y snap-mandatory scroll-pt-12">

      <header class="sticky flex justify-center top-0 bg-white p-4 z-10 h-15">
        <!-- maybe a mock buisness logo = canva? -->
        <h1 class="text-3xl font-bold text-blue-600">NUFREND</h1>
        <!-- dark mode toggle button would be cool -->
      </header>
      <!-- where all the dog profiles will be displayed -->
      <!-- need to fix grid expansion for much bigger screens -->
      <div id="feed-box" class="mx-auto p-4 w-full max-w-[1400px] grid gap-4 grid-cols-[repeat(auto-fit,minmax(350px,1fr))]">
        <!-- profiles -->
      </div>

    </div>

    <footer class="sticky bottom-0 bg-white border-t border-gray-300 z-10">
      <div class="mx-auto max-w-[1400px] flex justify-around items-center h-15">
        <!-- profile button -->
        <a href="https://tailwindcss.com/docs/width"><img src="../media/img/user.png" class="w-8 h-8"></a>
        <!-- feed page button -->
        <a href="./feed-page.html"><img src="../media/img/magnifying-glass.png" class="w-8 h-8"></a>
        <!-- favorites page -->
        <a href="#"><img src="../media/img/heart.png" class="w-8 h-8"></a>
        <!-- chats page -->
        <a href="#"><img src="../media/img/chat.png" class="w-8 h-8"></a>
      </div>
    </footer>
  </div>
</body>
</html>
