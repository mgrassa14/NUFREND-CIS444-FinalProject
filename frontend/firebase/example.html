<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NuFrend — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #1f2330;
      --accent:    #7effc4;
      --accent2:   #4f8eff;
      --text:      #e8eaf0;
      --muted:     #5a607a;
      --danger:    #ff6b6b;
      --radius:    14px;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
 
    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .bg-blob.b1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .bg-blob.b2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
    .bg-blob.b3 { width: 300px; height: 300px; background: #ff8fff; top: 50%; left: 50%; animation-delay: -8s; }
 
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }
 
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
 
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .logo span { color: var(--accent); }
 
    .tagline {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 36px;
    }
 
    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }
 
    .tab-row {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
 
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(126,255,196,0.08);
    }
    input::placeholder { color: var(--muted); }
 
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
    }
    .btn-primary:hover {
      background: #5df0ae;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(126,255,196,0.2);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
 
    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      display: none;
    }
    .message.success {
      background: rgba(126,255,196,0.1);
      border: 1px solid rgba(126,255,196,0.2);
      color: var(--accent);
      display: block;
    }
    .message.error {
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.2);
      color: var(--danger);
      display: block;
    }
 
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(13,15,20,0.3);
      border-top-color: #0d0f14;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    .token-box {
      margin-top: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: none;
    }
    .token-box.visible { display: block; }
    .token-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .token-value {
      font-size: 0.75rem;
      color: var(--accent2);
      word-break: break-all;
      font-family: monospace;
    }
    .copy-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
 
<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>
 
<div class="card">
  <div class="logo">Nu<span>Frend</span></div>
  <div class="tagline">Your social circle, reimagined.</div>
 
  <div class="tab-row">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>
 
  <!-- LOGIN FORM -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required />
    </div>
    <button class="btn btn-primary" type="submit" id="loginBtn">Login</button>
    <div class="message" id="loginMsg"></div>
    <div class="token-box" id="tokenBox">
      <div class="token-label">Auth Token</div>
      <div class="token-value" id="tokenValue"></div>
      <button type="button" class="copy-btn" onclick="copyToken()">Copy Token</button>
    </div>
  </form>
 
  <!-- REGISTER FORM -->
  <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min. 6 characters" required />
    </div>
    <button class="btn btn-primary" type="submit" id="registerBtn">Create Account</button>
    <div class="message" id="registerMsg"></div>
  </form>
</div>
 
<script>
  const API = 'http://localhost:3000/api';
 
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }
 
  function showMessage(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `message ${type}`;
  }
 
  function setLoading(btnId, loading, defaultText) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>Loading...` : defaultText;
  }
 
  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
 
    setLoading('loginBtn', true, 'Login');
 
    try {
      const res  = await fetch(`${API}/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password })
      });
      const data = await res.json();
 
      if (!res.ok) {
        showMessage('loginMsg', data.message || 'Login failed', 'error');
      } else {
        showMessage('loginMsg', 'Logged in successfully!', 'success');
        localStorage.setItem('token', data.idToken);
        localStorage.setItem('uid',   data.uid);
        // Show token box
        document.getElementById('tokenValue').textContent = data.idToken;
        document.getElementById('tokenBox').classList.add('visible');
      }
    } catch (err) {
      showMessage('loginMsg', 'Network error — is the server running?', 'error');
    } finally {
      setLoading('loginBtn', false, 'Login');
    }
  }
 
  async function handleRegister(e) {
    e.preventDefault();
    const email    = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
 
    setLoading('registerBtn', true, 'Create Account');
 
    try {
      const res  = await fetch(`${API}/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password })
      });
      const data = await res.json();
 
      if (!res.ok) {
        showMessage('registerMsg', data.message || 'Registration failed', 'error');
      } else {
        showMessage('registerMsg', 'Account created! You can now log in.', 'success');
        setTimeout(() => {
          document.querySelector('.tab').click();
          document.getElementById('loginEmail').value = email;
        }, 1500);
      }
    } catch (err) {
      showMessage('registerMsg', 'Network error — is the server running?', 'error');
    } finally {
      setLoading('registerBtn', false, 'Create Account');
    }
  }
 
  function copyToken() {
    const token = document.getElementById('tokenValue').textContent;
    navigator.clipboard.writeText(token).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Token', 2000);
    });
  }
</script>
</body>
</html>
